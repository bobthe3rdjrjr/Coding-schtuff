<!DOCTYPE html>

<html lang="en">
    <head>
        <meta name="author" content="Bob">
        <meta name="description" content="Convert between different weight units">
        <meta charset="UTF-8">
        <title>Weight Converter</title>
        <link rel="stylesheet" href="unit-converter.css">
    </head>
    <body>
        <form action="/units" method="get">
            <h1>Weight Converter</h1>

            <hr>

            <label for="base_unit">Old unit:</label>
            <input type="text" name="base_unit" id="base_unit" placeholder="eg. kilogram" autocomplete="on" required autofocus>
            <br>

            <label for="base_amt">Amount of unit:</label>
            <input type="text" name="base_amt" id="base_amt" placeholder="eg. 10" autocomplete="on" required>
            <br>

            <label for="conversion_unit">New unit:</label>
            <input type="text" name="conversion_unit" id="conversion_unit" placeholder="eg. pound" autocomplete="on" required> 
        </form>
    </body>
</html>
